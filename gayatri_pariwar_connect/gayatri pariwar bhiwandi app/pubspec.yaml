name: gayatri_pariwar_connect
description: "Gayatri Parivar Community App - Connect, Learn, and Serve"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_functions: ^5.1.3
  cloud_firestore: ^5.5.2
  firebase_storage: ^12.3.8
  firebase_messaging: ^15.1.8
  firebase_analytics: ^11.3.8
  google_sign_in: ^6.2.2

  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1
  table_calendar: ^3.1.2
  fl_chart: ^0.70.1
  photo_view: ^0.15.0

  # Media
  just_audio: ^0.9.42
  video_player: ^2.9.2
  chewie: ^1.8.5
  audio_session: ^0.1.21
  rxdart: ^0.28.0

  # Utilities
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  intl: ^0.20.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  permission_handler: ^11.3.1
  gal: ^2.3.0
  connectivity_plus: ^6.1.2
  flutter_colorpicker: ^1.1.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Cloudinary
  cloudinary_flutter: ^1.0.0
  cloudinary_url_gen: ^1.0.0
  
  # HTTP
  http: ^1.6.0
  dio: ^5.9.0

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  flutter_local_notifications: ^19.5.0
  package_info_plus: ^9.0.0
  flutter_cache_manager: ^3.4.1
  device_info_plus: ^12.3.0
  open_filex: ^4.7.0
  flutter_pdfview: ^1.4.3
  path_provider: ^2.1.5
  swipe_to: ^1.0.6
  scrollable_positioned_list: ^0.3.8
  timezone: ^0.10.1
  flutter_native_splash: ^2.4.0
  tutorial_coach_mark: ^1.3.3
  android_intent_plus: ^6.0.0
  percent_indicator: ^4.2.5
  pdf: ^3.11.3
  printing: ^5.14.2
  csv: ^6.0.0

  uuid: any
  record: ^6.1.2
  path: any
  youtube_player_flutter: ^10.0.1
  webview_flutter: ^4.14.0
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1


flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/param drishti/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon_new.jpg"
