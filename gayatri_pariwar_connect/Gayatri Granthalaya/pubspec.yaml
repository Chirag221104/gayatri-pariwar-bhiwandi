name: gayatri_granthalaya
description: An app for Gayatri Granthalaya inventory and sales.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.4.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.2.1
  intl: ^0.19.0
  barcode_widget: ^2.0.4
  mobile_scanner: ^3.5.5
  cached_network_image: ^3.3.1
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.13.1
  geolocator: ^10.1.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.4
  firebase_storage: ^12.3.2
  razorpay_flutter: ^1.3.5
  fl_chart: ^0.65.0
  csv: ^5.0.0
  pdf: ^3.10.0
  open_filex: ^4.3.2
  geocoding: ^4.0.0
  url_launcher: ^6.2.4
  file_picker: ^10.3.10
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^17.2.3
  printing: ^5.14.2
  cloud_functions: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  riverpod_annotation: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
    - assets/app_icon_new.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_new.jpg"
